services:
  postgres:
    image: postgres:16-alpine
    container_name: tubedigest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tubedigest
      POSTGRES_PASSWORD: tubedigest
      POSTGRES_DB: tubedigest
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
